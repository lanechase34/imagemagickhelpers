name: Test Suite

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
  
    strategy:
      fail-fast: false
      matrix:
        cfengine: [ "boxlang-cfml@1", "lucee@6", "lucee@7", "adobe@2025" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "21"
      
      - name: Setup CommandBox CLI
        uses: Ortus-Solutions/setup-commandbox@7be599028dcf77743854b2f6c720b15316f39be2 # v2.0.1
        with:
          version: latest

      - name: Install ImageMagick
        run: |
          # Pull the official portable ImageMagick 7 AppImage and extract it
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libfreetype6 libx11-6 libharfbuzz0b libfribidi0

          ASSET_URL=$(curl -fsSL https://api.github.com/repos/ImageMagick/ImageMagick/releases/latest \
            | jq -r '.assets[] | select(.name | test("gcc-x86_64.AppImage$")) | .browser_download_url')
          curl -fsSL -o /tmp/magick.AppImage "$ASSET_URL"
          chmod +x /tmp/magick.AppImage
          (cd /tmp && ./magick.AppImage --appimage-extract >/dev/null)
          sudo mv /tmp/squashfs-root /usr/local/lib/magick-appimage
          sudo ln -s /usr/local/lib/magick-appimage/AppRun /usr/local/bin/magick

          echo "IMAGEMAGICKPATH=$(command -v magick)" >> "$GITHUB_ENV"

      - name: Setup Environment For Testing Process
        run: |
          cat > .env << 'EOL'
          ENVIRONMENT=development
          IMAGEMAGICKPATH=${{ env.IMAGEMAGICKPATH }}
          EOL

      - name: Install Dependencies
        run: box install
        timeout-minutes: 10

      - name: Start ${{ matrix.cfengine }} Server
        run: |
          box server start serverConfigFile="server-${{ matrix.cfengine }}.json" --noSaveSettings --debug

      - name: Wait for Server to be Ready
        run: |
          echo "Waiting for server to start..."
          for i in {1..60}; do
            if curl -sf http://localhost:60299 > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
          echo "Server failed to start"
          box server log
          exit 1

      - name: Run Tests
        id: run_tests
        run: |
          mkdir -p tests/results
          box testbox run --verbose outputFile="tests/results/test-results" outputFormats="json,antjunit" \
            || echo "TESTS_FAILED=true" >> $GITHUB_ENV

      - name: Display Test Results
        if: always()
        run: |
          if [ -f "tests/results/test-results.json" ]; then
            echo "=== Test Results Summary ==="
            cat tests/results/test-results.json | jq -r '
              "Total Bundles: \(.totalBundles)",
              "Total Suites: \(.totalSuites)", 
              "Total Specs: \(.totalSpecs)",
              "Total Pass: \(.totalPass)",
              "Total Fail: \(.totalFail)",
              "Total Error: \(.totalError)",
              "Total Skipped: \(.totalSkipped)"
            '
          else
            echo "No test results found!"
            ls -la tests/results/ || echo "Results directory doesn't exist"
          fi

      - name: Publish Test Reports
        uses: mikepenz/action-junit-report@v6.0.1
        if: always()
        with:
          report_paths: |
            tests/results/**/*.xml
          check_name: "TestBox Report ${{ matrix.cfengine }}-${{ matrix.coldboxVersion }}"
          include_passed: false
          fail_on_failure: true
          detailed_summary: true

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: |
            tests/results/
            tests/results/*.json
            tests/results/*.xml
          retention-days: 30
        continue-on-error: true

      - name: Stop Server
        if: always()
        run: |
          box server stop serverConfigFile="server-${{ matrix.cfengine }}.json"
        continue-on-error: true
